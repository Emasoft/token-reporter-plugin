# Notify marketplace repo when this plugin is updated.
# Requires MARKETPLACE_PAT secret — a GitHub Personal Access Token (fine-grained
# or classic) with 'repo' scope on the target marketplace repository.

name: Notify Marketplace

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

permissions:
  contents: read

env:
  MARKETPLACE_OWNER: 'Emasoft'
  MARKETPLACE_REPO: 'emasoft-plugins'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: '.claude-plugin/plugin.json'

      - name: Get plugin info
        id: plugin
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Read the actual plugin name from plugin.json (may differ from repo name).
          # Explicit utf-8 encoding + context manager + clean error if the manifest
          # is missing or malformed (otherwise the workflow fails with a raw
          # traceback that's hard to diagnose in the Actions UI).
          if [ ! -f .claude-plugin/plugin.json ]; then
            echo "::error::.claude-plugin/plugin.json not found in checkout"
            exit 1
          fi
          PLUGIN_NAME=$(python3 - <<'PY'
          import json, sys
          try:
              with open('.claude-plugin/plugin.json', encoding='utf-8') as f:
                  data = json.load(f)
              name = data['name']
              if not name:
                  raise ValueError('plugin.json: name field is empty')
              print(name)
          except (json.JSONDecodeError, KeyError, ValueError, OSError) as e:
              print(f'::error::failed to read plugin.json: {e}', file=sys.stderr)
              sys.exit(1)
          PY
          )
          echo "name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "ref=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Trigger marketplace update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.MARKETPLACE_PAT }}
          repository: ${{ env.MARKETPLACE_OWNER }}/${{ env.MARKETPLACE_REPO }}
          event-type: plugin-updated
          client-payload: >-
            {"plugin": ${{ toJSON(steps.plugin.outputs.name) }}, "ref": ${{ toJSON(steps.plugin.outputs.ref) }}, "source_repo": ${{ toJSON(github.repository) }}, "triggered_by": ${{ toJSON(github.actor) }}}

      - name: Summary
        env:
          PLUGIN_NAME: ${{ steps.plugin.outputs.name }}
          PLUGIN_REF: ${{ steps.plugin.outputs.ref }}
        run: |
          {
            echo "## Marketplace Notification"
            echo ""
            echo "Triggered update in ${MARKETPLACE_OWNER}/${MARKETPLACE_REPO}"
            echo ""
            echo "- Plugin: ${PLUGIN_NAME}"
            echo "- Commit: ${PLUGIN_REF}"
          } >> "$GITHUB_STEP_SUMMARY"
